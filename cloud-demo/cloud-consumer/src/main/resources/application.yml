server:
  port: 8082
spring:
  application:
    name: cloud-consumer
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        ip: 127.0.0.1 # 强制在 Nacos 中注册为本地回环 IP，确保 Consumer 绝对能连上
    loadbalancer:
      cache:
        enabled: false
    sentinel:
      transport:
        # 1. 你的微服务告诉 Sentinel：控制台在哪里（Docker 暴露到了本地 8858）
        dashboard: 127.0.0.1:8858
        # 2. 关键！你的微服务告诉 Sentinel：我把 8719 端口开在 Mac 本地了，你来连我吧
        port: 8719
          # 3. 核心避坑：显式指定宿主机的 IP
        # 必须填你 Mac 在局域网的真实 IP（比如 192.168.X.X），千万不能写 127.0.0.1！
        # 否则 Docker 内部的 Sentinel 就会顺着 127.0.0.1 去连它自己，导致控制台一片空白。
        client-ip: 192.168.1.3 # TODO: 改成本机局域网 ip
feign:
  sentinel:
    enabled: true